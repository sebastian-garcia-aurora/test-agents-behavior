name: test-agents-behavior

services:
  postgres:
    image: postgres
    container_name: test-agents-behavior-postgres
    environment:
      POSTGRES_DB: test-agents-behavior
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - test-agents-behavior_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  test-agents-behavior_postgres_data:
